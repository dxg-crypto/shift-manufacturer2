<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Maker Pro Ver 30.1</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .sticky-name-col {
            position: sticky;
            left: 0;
            z-index: 20;
            background-color: white !important;
            border-right: 2px solid #e2e8f0;
            white-space: nowrap !important;
            min-width: 180px;
            padding-left: 0.75rem !important;
            padding-right: 0.75rem !important;
        }
        th.sticky-name-col {
            background-color: #f1f5f9 !important;
            z-index: 30;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- アイコンコンポーネント ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const paths = {
                Calendar: <g><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></g>,
                Users: <g><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></g>,
                Settings: <g><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></g>,
                CheckCircle: <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></g>,
                Trash2: <g><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></g>,
                RefreshCw: <g><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></g>,
                Star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
                ChevronUp: <polyline points="18 15 12 9 6 15" />,
                ChevronDown: <polyline points="6 9 12 15 18 9" />,
                Shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
                Baby: <g><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"/></g>,
                Flag: <g><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></g>,
                FileSpreadsheet: <g><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></g>,
                Store: <g><rect x="2" y="7" width="20" height="13" rx="2" ry="2"/><path d="M2 7l10-5 10 5"/><path d="M6 21V11"/><path d="M10 21V11"/><path d="M14 21V11"/><path d="M18 21V11"/></g>,
                Truck: <g><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></g>,
                AlertTriangle: <g><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></g>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const ROLES = {
          MANAGER: { id: 'manager', label: '店長', color: 'bg-purple-100 text-purple-800', hexBg: '#f3e8ff', hexText: '#6b21a8', icon: <Icon name="Star" size={14} /> },
          VICE_MANAGER: { id: 'vice_manager', label: '副店長', color: 'bg-purple-50 text-purple-700', hexBg: '#faf5ff', hexText: '#7e22ce', icon: <Icon name="Star" size={12} /> },
          CREW: { id: 'crew', label: 'クルー', color: 'bg-blue-100 text-blue-800', hexBg: '#dbeafe', hexText: '#1e40af', icon: <Icon name="User" size={14} /> },
          ROOKIE: { id: 'rookie', label: '新人', color: 'bg-yellow-100 text-yellow-800', hexBg: '#fef9c3', hexText: '#854d0e', icon: <Icon name="Baby" size={14} /> },
          PART_TIME: { id: 'part_time', label: 'バイト', color: 'bg-green-100 text-green-800', hexBg: '#dcfce7', hexText: '#166534', icon: <Icon name="User" size={14} /> },
          DISPATCH: { id: 'dispatch', label: '派遣', color: 'bg-orange-100 text-orange-800', hexBg: '#ffedd5', hexText: '#9a3412', icon: <Icon name="Store" size={14} /> },
          EVENT: { id: 'event', label: 'イベント専属', color: 'bg-rose-100 text-rose-800', hexBg: '#ffe4e6', hexText: '#9f1239', icon: <Icon name="Star" size={14} /> },
        };

        const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];
        const HOLIDAYS_2025 = ['2025-01-01', '2025-01-13', '2025-02-11', '2025-02-23', '2025-02-24', '2025-03-20', '2025-04-29', '2025-05-03', '2025-05-04', '2025-05-05', '2025-05-06', '2025-07-21', '2025-08-11', '2025-09-15', '2025-09-23', '2025-10-13', '2025-11-03', '2025-11-23', '2025-11-24'];
        const FIXED_OFF_DAYS = 10; 
        const MAX_CONSECUTIVE_WORK = 5; 

        const TabButton = ({ id, label, icon, isActive, onClick }) => (
          <button
            onClick={() => onClick(id)}
            className={`flex items-center gap-2 px-6 py-4 border-b-2 text-sm font-bold transition-all ${
              isActive ? 'border-blue-600 text-blue-600 bg-blue-50' : 'border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50'
            }`}
          >
            <Icon name={icon} size={18} />{label}
          </button>
        );

        function App() {
          const [activeTab, setActiveTab] = useState('settings');
          const [year, setYear] = useState(2025);
          const [month, setMonth] = useState(5);
          const [shiftMode, setShiftMode] = useState('complex');
          
          const [stores, setStores] = useState([]);
          const [activeStoreId, setActiveStoreId] = useState(null);
          const [newStoreName, setNewStoreName] = useState('');

          const [staffList, setStaffList] = useState([]);
          const [newStaffName, setNewStaffName] = useState('');
          const [newStaffRole, setNewStaffRole] = useState('crew');

          // ヘルプ店舗設定
          const [helpStores, setHelpStores] = useState([]); 
          const [newHelpStore, setNewHelpStore] = useState('');
          const [helpAssignments, setHelpAssignments] = useState({});

          // 行事マスタ
          const [staffEventTypes, setStaffEventTypes] = useState([
            { id: 'se_1', name: '会議', color: 'bg-indigo-600 text-white' },
            { id: 'se_2', name: 'イベント', color: 'bg-rose-500 text-white' },
          ]);
          const [newStaffEventName, setNewStaffEventName] = useState('');

          const [requests, setRequests] = useState({});
          const [schedule, setSchedule] = useState(null);
          const [generationLog, setGenerationLog] = useState([]);

          const STORAGE_KEY = 'shift_maker_pro_data_v30_1';

          useEffect(() => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
              try {
                const p = JSON.parse(saved);
                if (p.year) setYear(p.year);
                if (p.month) setMonth(p.month);
                if (p.stores) {
                    setStores(p.stores);
                    if (p.stores.length > 0) setActiveStoreId(p.stores[0].id);
                }
                if (p.staffList) setStaffList(p.staffList);
                if (p.helpStores) setHelpStores(p.helpStores);
                if (p.helpAssignments) setHelpAssignments(p.helpAssignments);
                if (p.requests) setRequests(p.requests);
                if (p.staffEventTypes) setStaffEventTypes(p.staffEventTypes);
                if (p.schedule) setSchedule(p.schedule);
                if (p.generationLog) setGenerationLog(p.generationLog);
              } catch (e) { console.error("Load Error", e); }
            }
          }, []);

          const saveToLocal = () => {
            const data = { year, month, stores, staffList, helpStores, helpAssignments, requests, staffEventTypes, schedule, generationLog };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); 
            alert("ブラウザに保存しました。");
          };

          const resetLocal = () => {
            if (confirm("全てのデータを消去して初期化しますか？")) {
                localStorage.removeItem(STORAGE_KEY);
                window.location.reload();
            }
          };

          const daysInMonth = useMemo(() => new Date(year, month, 0).getDate(), [year, month]);
          const dateList = Array.from({ length: daysInMonth }, (_, i) => i + 1);
          const getDateKey = (d) => `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const getWeekDayIndex = (d) => new Date(year, month - 1, d).getDay();
          const getWeekDay = (d) => WEEKDAYS[getWeekDayIndex(d)];
          
          const isStoreClosed = (store, d) => {
              if (!store) return false;
              const key = getDateKey(d);
              if (store.specificClosedDays.includes(key)) return true;
              return store.closedWeekDays.includes(getWeekDayIndex(d));
          };

          const activeStore = useMemo(() => stores.find(s => s.id === activeStoreId) || null, [stores, activeStoreId]);

          // --- Handlers ---
          const addStore = () => {
              if (!newStoreName || stores.length >= 15) return;
              const newId = `st_${Date.now()}`;
              setStores([...stores, { id: newId, name: newStoreName, reqWeekday: 2, reqWeekend: 3, reqEvent: 4, closedWeekDays: [], specificClosedDays: [], dailyStoreEvents: {} }]);
              if (!activeStoreId) setActiveStoreId(newId);
              setNewStoreName('');
          };

          const removeStore = (id) => {
              const nextStores = stores.filter(s => s.id !== id);
              setStores(nextStores);
              if (activeStoreId === id) setActiveStoreId(nextStores.length > 0 ? nextStores[0].id : null);
          };

          const updateStoreSetting = (id, key, value) => {
              setStores(stores.map(s => s.id === id ? { ...s, [key]: value } : s));
          };

          const toggleStoreSpecificDay = (storeId, d) => {
              const key = getDateKey(d);
              setStores(stores.map(s => {
                  if (s.id !== storeId) return s;
                  const days = s.specificClosedDays.includes(key) 
                    ? s.specificClosedDays.filter(k => k !== key) 
                    : [...s.specificClosedDays, key];
                  return { ...s, specificClosedDays: days };
              }));
          };

          const addStaff = () => {
            if (!newStaffName || !activeStoreId) return;
            const newId = staffList.length > 0 ? Math.max(...staffList.map(s => s.id)) + 1 : 1;
            setStaffList([...staffList, { id: newId, name: newStaffName, role: newStaffRole, isTrainer: false, wantConsecutive: false, homeStoreId: activeStoreId }]);
            setNewStaffName('');
          };

          const updateStaffInfo = (id, key, value) => {
              setStaffList(staffList.map(s => s.id === id ? { ...s, [key]: value } : s));
          };

          const moveStaff = (index, direction) => {
            const newList = [...staffList];
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= newList.length) return;
            [newList[index], newList[targetIndex]] = [newList[targetIndex], newList[index]];
            setStaffList(newList);
          };

          const toggleStaffAttribute = (id, attr) => {
            setStaffList(staffList.map(s => s.id === id ? { ...s, [attr]: !s[attr] } : s));
          };

          const removeStaff = (id) => setStaffList(staffList.filter(s => s.id !== id));

          const handleRequestChange = (staffId, d) => {
              const key = `${staffId}_${getDateKey(d)}`;
              const current = requests[key];
              const cycle = [undefined, 'off', 'paid', ...staffEventTypes.map(e => e.id)];
              const currentIndex = cycle.indexOf(current);
              const nextIndex = (currentIndex + 1) % cycle.length;
              setRequests({ ...requests, [key]: cycle[nextIndex] });
          };

          const toggleDailyStoreEvent = (d, storeId) => {
            const key = getDateKey(d);
            const store = stores.find(s => s.id === storeId);
            const currentId = store.dailyStoreEvents[key];
            
            let nextEvId;
            if (!currentId) {
                if (staffEventTypes.length > 0) nextEvId = staffEventTypes.find(e=>e.name === 'イベント')?.id || staffEventTypes[0].id;
            } else {
                nextEvId = undefined; 
            }

            const newDailyStoreEvents = { ...store.dailyStoreEvents };
            if (nextEvId) newDailyStoreEvents[key] = nextEvId;
            else delete newDailyStoreEvents[key];
            updateStoreSetting(storeId, 'dailyStoreEvents', newDailyStoreEvents);

            if (confirm(`この店舗の全スタッフに「${nextEvId ? staffEventTypes.find(e=>e.id===nextEvId).name : '未設定'}」を反映させますか？\n※希望休や有給は上書きされません`)) {
                let newRequests = { ...requests };
                staffList.filter(s => s.homeStoreId === storeId).forEach(s => {
                    const reqKey = `${s.id}_${key}`;
                    const currentReq = newRequests[reqKey];
                    if (!['off', 'paid'].includes(currentReq)) {
                        if (nextEvId) newRequests[reqKey] = nextEvId;
                        else delete newRequests[reqKey];
                    }
                });
                setRequests(newRequests);
            }
          };

          // ヘルプ機能
          const addHelpStore = () => {
              if (newHelpStore && !helpStores.includes(newHelpStore)) setHelpStores([...helpStores, newHelpStore]);
              setNewHelpStore('');
          };
          const removeHelpStore = (n) => setHelpStores(helpStores.filter(s => s !== n));
          
          const handleHelpAssignment = (staffId, d, storeName) => {
              const key = `${staffId}_${getDateKey(d)}`;
              const newAssign = { ...helpAssignments };
              if (storeName === '') delete newAssign[key];
              else newAssign[key] = storeName;
              setHelpAssignments(newAssign);
          };

          const applyHelpAllDays = (staffId, storeName) => {
              const newAssign = { ...helpAssignments };
              dateList.forEach(d => {
                  const key = `${staffId}_${getDateKey(d)}`;
                  if (storeName === '') {
                      delete newAssign[key];
                  } else {
                      newAssign[key] = storeName;
                  }
              });
              setHelpAssignments(newAssign);
          };

          // --- シフト生成ロジック ---
          const generateShift = () => {
            let newSchedule = {};
            let logs = [];

            const staffSim = staffList.map(s => ({
                ...s,
                assigns: Array(daysInMonth).fill(null),
                shiftTypes: Array(daysInMonth).fill(null),
                consecutive: 0,
                totalHolidays: 0
            }));

            // 1. 確定情報の埋め込み
            for (let i = 0; i < daysInMonth; i++) {
                const d = i + 1;
                const dateKey = getDateKey(d);

                staffSim.forEach(s => {
                    const req = requests[`${s.id}_${dateKey}`];
                    const helpDest = helpAssignments[`${s.id}_${dateKey}`];
                    const store = stores.find(st => st.id === s.homeStoreId);
                    const isDayClosed = store ? isStoreClosed(store, d) : false;

                    if (isDayClosed) {
                        s.assigns[i] = "定休";
                        s.totalHolidays++;
                        s.consecutive = 0;
                    } else if (req === 'off') {
                        s.assigns[i] = "希望休";
                        s.totalHolidays++;
                        s.consecutive = 0;
                    } else if (req === 'paid') {
                        s.assigns[i] = "有給";
                        s.consecutive = 0;
                    } else if (helpDest) {
                        s.assigns[i] = `ヘルプ(${helpDest})`;
                        s.shiftTypes[i] = "未定"; 
                        s.consecutive++;
                    } else if (req) {
                        const staffEvent = staffEventTypes.find(e => e.id === req);
                        if (staffEvent) {
                            s.assigns[i] = staffEvent.name; 
                            s.shiftTypes[i] = staffEvent.name; 
                            s.consecutive++;
                        }
                    }
                });
            }

            // 2. 日次・店舗割り当て
            for (let i = 0; i < daysInMonth; i++) {
                const d = i + 1;
                const dateKey = getDateKey(d);
                const isH = HOLIDAYS_2025.includes(dateKey) || [0, 6].includes(getWeekDayIndex(d));

                stores.forEach(store => {
                    if (isStoreClosed(store, d)) return;
                    const isEvt = !!store.dailyStoreEvents[dateKey];
                    // ★平日でも最低2名は確保する
                    let targetNum = isEvt ? store.reqEvent : (isH ? store.reqWeekend : store.reqWeekday);
                    if (!isH && !isEvt && targetNum < 2) targetNum = 2; 
                    
                    let currentWorkers = [];
                    staffSim.forEach(s => {
                        // 自店舗の出勤
                        if (s.homeStoreId === store.id && s.assigns[i] && !['希望休','公休','定休','有給'].includes(s.assigns[i]) && !s.assigns[i].startsWith('ヘルプ')) {
                            currentWorkers.push(s);
                        }
                        // 他店からヘルプで来る人
                        if (s.assigns[i] === `ヘルプ(${store.name})`) {
                            currentWorkers.push(s);
                        }
                    });

                    // 候補者（自店舗でまだ未定の人）
                    let candidates = staffSim.filter(s => s.homeStoreId === store.id && s.assigns[i] === null);

                    const getConsecutive = (staff, dayIdx) => {
                        let count = 0;
                        for (let k = dayIdx - 1; k >= 0; k--) {
                            if (!['希望休','公休','定休','有給'].includes(staff.assigns[k]) && staff.assigns[k] !== null) count++;
                            else break;
                        }
                        return count;
                    };

                    let needed = Math.max(0, targetNum - currentWorkers.length);
                    let newAssigned = [];

                    // ★責任者の絶対確保 (連勤を無視してでも探す)
                    const hasManager = currentWorkers.some(s => s.role === 'manager' || s.role === 'vice_manager');
                    if (!hasManager) {
                        let mgrCandidates = candidates.filter(s => s.role === 'manager' || s.role === 'vice_manager');
                        // 候補にいない場合（連勤MAX等で弾かれる前だが、念のため全未定者から）
                        if (mgrCandidates.length === 0) {
                            mgrCandidates = staffSim.filter(s => s.homeStoreId === store.id && s.assigns[i] === null && (s.role === 'manager' || s.role === 'vice_manager'));
                        }
                        if (mgrCandidates.length > 0) {
                            mgrCandidates.sort((a, b) => getConsecutive(a, i) - getConsecutive(b, i)); // 連勤が少ない人を優先
                            const mgr = mgrCandidates[0];
                            mgr.assigns[i] = store.name;
                            mgr.shiftTypes[i] = "未定";
                            newAssigned.push(mgr);
                            candidates = candidates.filter(s => s.id !== mgr.id);
                            needed = Math.max(0, needed - 1);
                        }
                    }

                    // 通常の連勤MAX除外
                    candidates = candidates.filter(s => {
                        if (getConsecutive(s, i) >= MAX_CONSECUTIVE_WORK) {
                            s.assigns[i] = "公休";
                            s.totalHolidays++;
                            return false;
                        }
                        return true;
                    });

                    // スコアリング (飛び石回避)
                    candidates.sort((a, b) => {
                        let scoreA = Math.random() * 10, scoreB = Math.random() * 10;
                        const prevA = i > 0 ? a.assigns[i-1] : null;
                        const prevB = i > 0 ? b.assigns[i-1] : null;
                        const isPrevOffA = ['希望休','公休','定休','有給'].includes(prevA);
                        const isPrevOffB = ['希望休','公休','定休','有給'].includes(prevB);

                        const nextReqA = requests[`${a.id}_${getDateKey(d+1)}`];
                        const nextReqB = requests[`${b.id}_${getDateKey(d+1)}`];
                        const isNextOffA = nextReqA === 'off' || nextReqA === 'paid' || isStoreClosed(store, d+1);
                        const isNextOffB = nextReqB === 'off' || nextReqB === 'paid' || isStoreClosed(store, d+1);

                        // 昨日休みで明日も休みなら今日は絶対休ませたい
                        if (isPrevOffA && isNextOffA) scoreA -= 500;
                        if (isPrevOffB && isNextOffB) scoreB -= 500;
                        if (isPrevOffA) scoreA -= 50;
                        if (isPrevOffB) scoreB -= 50;

                        return scoreB - scoreA;
                    });

                    while (needed > 0 && candidates.length > 0) {
                        const picked = candidates.shift();
                        
                        if (picked.role === 'rookie') {
                            // 月前半(1〜15日)は必ず教育担当とセット
                            if (d <= 15) {
                                let trainer = currentWorkers.find(m => m.isTrainer) || newAssigned.find(m => m.isTrainer);
                                if (!trainer) {
                                    const tIdx = candidates.findIndex(c => c.isTrainer);
                                    if (tIdx !== -1) {
                                        trainer = candidates.splice(tIdx, 1)[0];
                                        trainer.assigns[i] = store.name;
                                        trainer.shiftTypes[i] = "未定";
                                        newAssigned.push(trainer);
                                        needed--;
                                    }
                                }
                                if (!trainer) {
                                    picked.assigns[i] = "公休";
                                    picked.totalHolidays++;
                                    continue; 
                                }
                            }
                        }

                        picked.assigns[i] = store.name;
                        picked.shiftTypes[i] = "未定";
                        newAssigned.push(picked);
                        needed--;
                    }

                    // 1人出勤回避の最終確認
                    const totalAssigned = currentWorkers.length + newAssigned.length;
                    if (totalAssigned === 1 && candidates.length > 0) {
                        const picked = candidates.shift();
                        if (picked.role === 'rookie' && d <= 15) {
                            let trainer = currentWorkers.find(m => m.isTrainer) || newAssigned.find(m => m.isTrainer);
                            if (!trainer) {
                                const tIdx = candidates.findIndex(c => c.isTrainer);
                                if (tIdx !== -1) {
                                    trainer = candidates.splice(tIdx, 1)[0];
                                    trainer.assigns[i] = store.name;
                                    trainer.shiftTypes[i] = "未定";
                                    newAssigned.push(trainer);
                                }
                            }
                            if (trainer) {
                                picked.assigns[i] = store.name;
                                picked.shiftTypes[i] = "未定";
                                newAssigned.push(picked);
                            }
                        } else {
                            picked.assigns[i] = store.name;
                            picked.shiftTypes[i] = "未定";
                            newAssigned.push(picked);
                        }
                    }

                    // 余った人は公休
                    candidates.forEach(s => {
                        s.assigns[i] = "公休";
                        s.totalHolidays++;
                    });

                    // シフトタイプ決定 (早/遅/フル)
                    const allWorkersToday = [...currentWorkers, ...newAssigned].filter(s => s.shiftTypes[i] === "未定");
                    const rookies = allWorkersToday.filter(s => s.role === 'rookie');
                    const trainers = allWorkersToday.filter(s => s.isTrainer);
                    const others = allWorkersToday.filter(s => s.role !== 'rookie' && !s.isTrainer);

                    let earlyCount = 0, lateCount = 0;
                    
                    rookies.forEach(r => {
                        const type = earlyCount <= lateCount ? '早' : '遅';
                        r.shiftTypes[i] = type;
                        if (type === '早') earlyCount++; else lateCount++;
                        
                        // ★月前半はトレーナーと同じシフトに同期
                        if (d <= 15) {
                            const t = trainers.find(tr => tr.shiftTypes[i] === "未定");
                            if (t) {
                                t.shiftTypes[i] = type;
                                if (type === '早') earlyCount++; else lateCount++;
                            }
                        }
                    });

                    trainers.forEach(t => {
                        if (t.shiftTypes[i] === "未定") {
                            const type = earlyCount <= lateCount ? '早' : '遅';
                            t.shiftTypes[i] = type;
                            if (type === '早') earlyCount++; else lateCount++;
                        }
                    });

                    others.forEach((s, idx) => {
                        if ((allWorkersToday.length === 1) || (allWorkersToday.length % 2 !== 0 && idx === others.length - 1)) {
                            s.shiftTypes[i] = 'フル';
                        } else {
                            const type = earlyCount <= lateCount ? '早' : '遅';
                            s.shiftTypes[i] = type;
                            if (type === '早') earlyCount++; else lateCount++;
                        }
                    });
                });
            }

            // 3. 休日数強制調整 (10日)
            staffSim.forEach(s => {
                let diff = FIXED_OFF_DAYS - s.totalHolidays;

                // --- 休み不足 -> 出勤日を公休に ---
                let loopGuard = 0;
                while (diff > 0 && loopGuard < 30) {
                    loopGuard++;
                    let workDays = s.assigns.map((v, idx) => ({v, idx}))
                        .filter(o => !['公休','希望休','定休','有給','-'].includes(o.v) && !o.v.startsWith('ヘルプ') && !staffEventTypes.some(e => e.name === o.v));
                    
                    if (workDays.length === 0) break;

                    workDays.forEach(wd => {
                        wd.score = 0;
                        const idx = wd.idx;
                        const store = stores.find(x => x.id === s.homeStoreId);
                        
                        let workersCount = 0;
                        let managerCount = 0;
                        staffSim.forEach(ss => {
                            if (ss.assigns[idx] && !['公休','希望休','定休','有給','-'].includes(ss.assigns[idx]) && !ss.assigns[idx].startsWith('ヘルプ')) {
                                if (ss.homeStoreId === s.homeStoreId) {
                                    workersCount++;
                                    if (ss.role === 'manager' || ss.role === 'vice_manager') managerCount++;
                                }
                            }
                        });

                        // ガード: 責任者不在回避
                        if ((s.role === 'manager' || s.role === 'vice_manager') && managerCount <= 1) wd.score -= 100000;
                        
                        // ガード: 最低2人ルール
                        if (workersCount <= 2) wd.score -= 10000;

                        // 飛び石回避: 自分が休むと、隣が「休・出・休」の「出」になってしまうか
                        const isWork = (i) => i >= 0 && i < daysInMonth && !['公休','希望休','定休','有給','-'].includes(s.assigns[i]);
                        const isOff = (i) => i < 0 || i >= daysInMonth || ['公休','希望休','定休','有給','-'].includes(s.assigns[i]);
                        if (isWork(idx - 1) && isOff(idx - 2)) wd.score -= 5000;
                        if (isWork(idx + 1) && isOff(idx + 2)) wd.score -= 5000;

                        // 優先: 出勤人数が多い日を休みにする
                        wd.score += workersCount * 10;
                    });

                    workDays.sort((a, b) => b.score - a.score);
                    const target = workDays[0];
                    
                    if (target.score <= -50000) break; // 責任者がいなくなるのでこれ以上休めない

                    s.assigns[target.idx] = "公休";
                    s.shiftTypes[target.idx] = null;
                    s.totalHolidays++;
                    diff--;
                }

                // --- 休みすぎ -> 公休を出勤に ---
                loopGuard = 0;
                while (diff < 0 && loopGuard < 30) {
                    loopGuard++;
                    let offDays = s.assigns.map((v, idx) => ({v, idx})).filter(o => o.v === '公休');
                    if (offDays.length === 0) break;

                    offDays.forEach(od => {
                        od.score = 0;
                        const idx = od.idx;
                        const store = stores.find(x => x.id === s.homeStoreId);

                        // 連勤チェック (5連勤以上は不可)
                        let seq = 1;
                        for (let k = idx - 1; k >= 0; k--) {
                            if (!['希望休','公休','定休','有給','-'].includes(s.assigns[k])) seq++; else break;
                        }
                        for (let k = idx + 1; k < daysInMonth; k++) {
                            if (!['希望休','公休','定休','有給','-'].includes(s.assigns[k])) seq++; else break;
                        }
                        if (seq > MAX_CONSECUTIVE_WORK) {
                            od.score -= 100000; 
                        }

                        // 飛び石回避: 自分が「休・出・休」にならないか
                        const isOff = (i) => i < 0 || i >= daysInMonth || ['公休','希望休','定休','有給','-'].includes(s.assigns[i]);
                        if (isOff(idx - 1) && isOff(idx + 1)) od.score -= 5000;

                        if (store) {
                            const dateKey = getDateKey(idx + 1);
                            const isEvt = !!store.dailyStoreEvents[dateKey];
                            const day = new Date(year, month - 1, idx + 1).getDay();
                            const isH = HOLIDAYS_2025.includes(dateKey) || [0, 6].includes(day);
                            
                            let targetNum = isEvt ? store.reqEvent : (isH ? store.reqWeekend : store.reqWeekday);
                            if (!isH && !isEvt && targetNum < 2) targetNum = 2; // 平日最低2

                            let wCount = 0;
                            staffSim.forEach(ss => {
                                if (ss.homeStoreId === store.id && ss.assigns[idx] && !['公休','希望休','定休','有給','-'].includes(ss.assigns[idx])) wCount++;
                            });

                            const shortage = targetNum - wCount;
                            
                            if (shortage > 0) {
                                // 目標人数に達していない日を最優先で埋める
                                od.score += shortage * 10000;
                            } else {
                                // 目標に達しているが、あふれる場合
                                // 月・金を厚くする
                                if (day === 1 || day === 5) od.score += 500;
                                // 平準化（人が少ない日を優先）
                                od.score -= wCount * 10;
                            }
                        }
                    });

                    offDays.sort((a, b) => b.score - a.score);
                    const target = offDays[0];

                    if (target.score <= -50000) break; // 連勤上限などで出勤できる日がない

                    const st = stores.find(x => x.id === s.homeStoreId);
                    if (s.role === 'rookie' && (target.idx + 1) <= 15) {
                        const trainer = staffSim.find(t => t.homeStoreId === s.homeStoreId && t.isTrainer && !['公休','希望休','定休','有給','-'].includes(t.assigns[target.idx]));
                        s.assigns[target.idx] = st ? st.name : '出勤';
                        s.shiftTypes[target.idx] = trainer ? (trainer.shiftTypes[target.idx] || '早') : '早';
                    } else {
                        s.assigns[target.idx] = st ? st.name : '出勤';
                        s.shiftTypes[target.idx] = '早'; 
                    }
                    s.totalHolidays--;
                    diff++;
                }
            });

            // 4. フォーマット変換とヘルプ提案ログ
            for (let i = 0; i < daysInMonth; i++) {
                const d = i + 1;
                const dateKey = getDateKey(d);
                const isH = HOLIDAYS_2025.includes(dateKey) || [0, 6].includes(getWeekDayIndex(d));

                stores.forEach(store => {
                    if (isStoreClosed(store, d)) return;
                    const isEvt = !!store.dailyStoreEvents[dateKey];
                    let targetNum = isEvt ? store.reqEvent : (isH ? store.reqWeekend : store.reqWeekday);
                    if (!isH && !isEvt && targetNum < 2) targetNum = 2;

                    let wCount = 0;
                    staffSim.forEach(s => {
                        if (s.homeStoreId === store.id && !['希望休','公休','定休','有給'].includes(s.assigns[i]) && !s.assigns[i].startsWith('ヘルプ')) wCount++;
                        if (s.assigns[i] === `ヘルプ(${store.name})`) wCount++;
                    });

                    if (wCount < targetNum) {
                        const shortage = targetNum - wCount;
                        let helpCandidatesByStore = {};
                        stores.forEach(otherStore => {
                            if (otherStore.id !== store.id) {
                                const available = staffSim.filter(s => s.homeStoreId === otherStore.id && s.assigns[i] === '公休').length;
                                if (available > 0) helpCandidatesByStore[otherStore.name] = available;
                            }
                        });
                        let suggestion = "";
                        const helpStoresList = Object.entries(helpCandidatesByStore);
                        if (helpStoresList.length > 0) {
                            suggestion = `👉提案: ${helpStoresList.map(([n, c]) => `${n}(${c}名)`).join(', ')} の公休スタッフからヘルプを検討してください。`;
                        } else {
                            suggestion = `👉エリア内に公休のスタッフがいません。`;
                        }
                        logs.push(`⚠️ ${d}日(${getWeekDay(d)}) 【${store.name}】 ${shortage}名不足。${suggestion}`);
                    }
                });
            }

            staffSim.forEach(s => {
                for (let i = 0; i < daysInMonth; i++) {
                    const k = `${s.id}_${getDateKey(i+1)}`;
                    if (['希望休','公休','定休','有給'].includes(s.assigns[i])) {
                        newSchedule[k] = s.assigns[i];
                    } else if (s.assigns[i] && s.assigns[i].startsWith('ヘルプ')) {
                        newSchedule[k] = s.assigns[i] + (s.shiftTypes[i] && s.shiftTypes[i] !== "未定" ? `(${s.shiftTypes[i]})` : '(フル)');
                    } else if (s.assigns[i]) {
                        const isEvent = staffEventTypes.some(e => e.name === s.assigns[i]);
                        if (isEvent) {
                            newSchedule[k] = s.assigns[i];
                        } else {
                            newSchedule[k] = `${s.assigns[i]}(${s.shiftTypes[i] || 'フル'})`;
                        }
                    } else {
                        newSchedule[k] = '-';
                    }
                }
            });

            setSchedule(newSchedule);
            setGenerationLog(logs);
            setActiveTab('result');
            saveToLocal();
          };

          // Excel出力
          const handleExcelExport = () => {
            if (!schedule) return;

            const getStyle = (val) => {
              if (!val) return '';
              if (val.includes('早')) return 'background-color:#eff6ff; color:#1e40af; font-weight:bold; border: 1px solid #cbd5e1;';
              if (val.includes('遅')) return 'background-color:#fff7ed; color:#9a3412; font-weight:bold; border: 1px solid #cbd5e1;';
              if (val.includes('フル')) return 'background-color:#faf5ff; color:#6b21a8; font-weight:bold; border: 1px solid #cbd5e1;';
              if (val === '希望休') return 'background-color:#d1d5db; color:#374151; font-weight:bold; border: 1px solid #9ca3af;';
              if (val === '有給') return 'background-color:#fbcfe8; color:#be185d; font-weight:bold; border: 1px solid #f472b6;';
              if (val === '公休') return 'background-color:#e0f2fe; color:#0369a1; border: 1px solid #bae6fd;';
              if (val === '定休') return 'background-color:#fecaca; color:#991b1b; border: 1px solid #fca5a5;';
              if (val.includes('ヘルプ') || val === '応援') return 'background-color:#ccfbf1; color:#115e59; font-weight:bold; border: 1px solid #5eead4;';
              if (val === '-') return 'color:#9ca3af; background-color:#f3f4f6; border: 1px solid #e5e7eb;';
              
              const sEvt = staffEventTypes.find(e => e.name === val);
              if (sEvt) return `background-color:${sEvt.color.includes('bg-') ? '#cbd5e1' : '#e0e7ff'}; color: #3730a3; font-weight:bold; border: 1px solid #818cf8;`;
              return 'background-color:#fef9c3; color:#854d0e; font-weight:bold; border: 1px solid #fde047;'; 
            };

            let tableHTML = `
              <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
              <head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"></head>
              <body style="font-family: 'Meiryo', sans-serif;">
            `;

            stores.forEach(st => {
                const members = staffList.filter(s => s.homeStoreId === st.id);
                let helpInMembers = [];
                staffList.forEach(s => {
                    if (s.homeStoreId !== st.id) {
                        let isComing = false;
                        dateList.forEach(d => {
                            const val = schedule[`${s.id}_${getDateKey(d)}`];
                            if (val && val.startsWith(`ヘルプ(${st.name})`)) isComing = true;
                        });
                        if (isComing) helpInMembers.push(s);
                    }
                });

                if (members.length === 0 && helpInMembers.length === 0) return;

                tableHTML += `<h2 style="color: #0f172a; margin-top: 30px; font-size: 18px;">■ 【${st.name}】 シフト表 - ${year}年${month}月</h2>`;
                tableHTML += `<table style="border-collapse: collapse; font-size: 12px; margin-bottom: 20px;">
                <thead>
                    <tr>
                    <th style="padding: 10px; width: 120px; background-color: #1e293b; color: white; border: 1px solid #475569;">スタッフ名</th>
                    <th style="padding: 10px; width: 70px; background-color: #1e293b; color: white; border: 1px solid #475569;">役職</th>`;
                    
                dateList.forEach(d => {
                    const isC = isStoreClosed(st, d); 
                    const isEvt = !!st.dailyStoreEvents[getDateKey(d)]; 
                    const isH = HOLIDAYS_2025.includes(getDateKey(d)) || [0, 6].includes(getWeekDayIndex(d));
                    
                    const bg = isC ? '#fee2e2' : (isEvt ? '#fca5a5' : (isH ? '#ffedd5' : '#f8fafc'));
                    const color = isC ? '#991b1b' : (isEvt ? '#7f1d1d' : (isH ? '#ea580c' : '#334155'));
                    tableHTML += `<th style="background-color:${bg}; color:${color}; padding:8px 4px; width:45px; text-align:center; border: 1px solid #cbd5e1;">${d}<br/><span style="font-size:10px; font-weight:normal;">${getWeekDay(d)}</span></th>`;
                });
                tableHTML += `<th style="padding:10px; width:60px; background-color: #1e293b; color: white; border: 1px solid #475569;">休日<br>(公+希+定)</th>
                              <th style="padding:10px; width:50px; background-color: #831843; color: #fbcfe8; border: 1px solid #475569;">有給</th></tr></thead><tbody>`;

                members.forEach(staff => {
                    const r = Object.values(ROLES).find(role => role.id === staff.role) || ROLES.CREW;
                    let offCount = 0;
                    let paidCount = 0;
                    dateList.forEach(d => {
                        const v = schedule[`${staff.id}_${getDateKey(d)}`] || '';
                        if (['定休', '公休', '希望休'].includes(v)) offCount++;
                        if (v === '有給') paidCount++;
                    });
                    tableHTML += `<tr>
                        <td style="padding:10px; font-weight:bold; border: 1px solid #cbd5e1; background-color: #ffffff;">${staff.name} ${staff.isTrainer ? '<span style="color:#4f46e5; font-size:10px;">(教)</span>' : ''}</td>
                        <td style="padding:10px; font-size:11px; text-align:center; border: 1px solid #cbd5e1; background-color:${r.hexBg}; color:${r.hexText};">${r.label}</td>`;
                    
                    dateList.forEach(d => {
                        const val = schedule[`${staff.id}_${getDateKey(d)}`] || '';
                        let style = getStyle(val);
                        let displayVal = val;
                        
                        if (val.startsWith('ヘルプ')) {
                            const dest = val.match(/ヘルプ\((.*?)\)/)?.[1] || '';
                            const type = val.match(/\)\((.*?)\)$/)?.[1] || '';
                            displayVal = `→${dest}<br/>${type}`;
                            style = 'background-color:#f0fdfa; color:#0f766e; font-weight:bold; border: 1px solid #99f6e4;';
                        } else if (val.startsWith(st.name)) {
                            displayVal = val.match(/\((.*?)\)/)?.[1] || 'フル';
                        }
                        tableHTML += `<td style="text-align:center; padding:8px 4px; ${style}">${displayVal}</td>`;
                    });
                    
                    const offStyle = offCount < FIXED_OFF_DAYS ? 'color: #e11d48; font-weight: bold; background-color: #fff1f2;' : 'color: #059669; font-weight: bold; background-color: #ecfdf5;';
                    tableHTML += `<td style="text-align:center; padding:10px; border: 1px solid #cbd5e1; ${offStyle}">${offCount}</td>
                                  <td style="text-align:center; padding:10px; border: 1px solid #cbd5e1; color:#be185d; font-weight:bold; background-color:#fdf2f8;">${paidCount}</td></tr>`;
                });

                // ヘルプ受入
                helpInMembers.forEach(staff => {
                    tableHTML += `<tr>
                        <td style="padding:10px; font-weight:bold; border: 1px solid #cbd5e1; background-color: #f0fdfa;">${staff.name}</td>
                        <td style="padding:10px; font-size:10px; text-align:center; border: 1px solid #cbd5e1; background-color: #fff; color:#0f766e; font-weight:bold;">応援</td>`;
                    
                    dateList.forEach(d => {
                        const val = schedule[`${staff.id}_${getDateKey(d)}`] || '';
                        if (val && val.startsWith(`ヘルプ(${st.name})`)) {
                            let displayVal = '早';
                            if (val.includes('遅')) displayVal = '遅';
                            else if (val.includes('フル')) displayVal = 'フル';
                            tableHTML += `<td style="text-align:center; padding:8px 4px; background-color:#ccfbf1; color:#115e59; font-weight:bold; border: 1px solid #5eead4; border-bottom: 2px solid #14b8a6;">応援<br/>${displayVal}</td>`;
                        } else {
                            tableHTML += `<td style="text-align:center; padding:8px 4px; border: 1px solid #cbd5e1; color: #94a3b8;">-</td>`;
                        }
                    });
                    tableHTML += `<td style="border: 1px solid #cbd5e1; background-color: #f1f5f9;">-</td><td style="border: 1px solid #cbd5e1; background-color: #f1f5f9;">-</td></tr>`;
                });
                
                tableHTML += `<tr><td colspan="2" style="padding:10px; font-weight:bold; text-align:right; background-color:#334155; color: white; border: 1px solid #475569;">出勤計</td>`;
                dateList.forEach(d => {
                    const key = getDateKey(d); let workers = 0;
                    staffList.forEach(s => {
                        const v = schedule[`${s.id}_${key}`]; 
                        const isHomeWorker = v && v.startsWith(st.name);
                        const isHelpWorker = v && v.startsWith(`ヘルプ(${st.name})`);
                        if (isHomeWorker || isHelpWorker) workers++;
                    });
                    
                    const isEvt = !!st.dailyStoreEvents[getDateKey(d)];
                    const isH = HOLIDAYS_2025.includes(getDateKey(d)) || [0, 6].includes(getWeekDayIndex(d));
                    let targetNum = isEvt ? st.reqEvent : (isH ? st.reqWeekend : st.reqWeekday);
                    if (!isH && !isEvt && targetNum < 2) targetNum = 2; // 平日最低2名

                    const countStyle = workers < targetNum && !isStoreClosed(st, d) ? 'color: #ef4444; background-color: #fee2e2;' : 'color: #334155; background-color: #f1f5f9;';
                    
                    tableHTML += `<td style="text-align:center; padding:8px 4px; font-weight:bold; border: 1px solid #cbd5e1; ${countStyle}">${workers}</td>`;
                });
                tableHTML += `<td style="border: 1px solid #cbd5e1; background-color: #f1f5f9;"></td><td style="border: 1px solid #cbd5e1; background-color: #f1f5f9;"></td></tr></tbody></table>`;
            });

            tableHTML += `</body></html>`;

            const blob = new Blob([tableHTML], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');

                        <div className="flex flex-col md:flex-row justify-between items-center bg-slate-900 p-8 rounded-[40px] shadow-2xl text-white">
                            <div className="flex items-center gap-8">
                                <button onClick={generateShift} className="bg-blue-600 hover:bg-blue-700 text-white px-12 py-5 rounded-[24px] font-black shadow-xl shadow-blue-600/40 flex items-center gap-4 transition-all active:scale-95 text-xl">
                                    <Icon name="RefreshCw" size={28}/> 
                                    GENERATE SHIFT
                                </button>
                                <div className="text-slate-400 text-xs font-bold border-l border-slate-700 pl-8 hidden md:block">
                                    <p className="flex items-center gap-2"><div className="w-2 h-2 bg-blue-500 rounded-full"></div> MAX 5 DAYS WORK / 10 DAYS OFF</p>
                                    <p className="flex items-center gap-2 mt-1"><div className="w-2 h-2 bg-rose-500 rounded-full"></div> 1st-15th: ROOKIE & TRAINER PAIRED</p>
                                </div>
                            </div>
                            <button onClick={handleExcelExport} className="bg-emerald-500 hover:bg-emerald-600 text-white px-10 py-5 rounded-2xl font-black flex items-center gap-3 transition-all active:scale-95 shadow-xl shadow-emerald-600/20">
                                <Icon name="FileSpreadsheet" size={24}/> EXCEL DOWNLOAD
                            </button>
                        </div>
                        
                        {generationLog.length > 0 && (
                            <div className="bg-rose-50 p-6 rounded-3xl text-sm font-bold text-rose-800 border-2 border-rose-200 shadow-inner">
                                <div className="flex items-center gap-2 mb-3 text-rose-600"><Icon name="AlertTriangle" size={20}/> 調整事項・不足警告</div>
                                <ul className="space-y-2">
                                    {generationLog.map((l, i) => <li key={i}>{l}</li>)}
                                </ul>
                            </div>
                        )}

                        {schedule ? stores.map(st => {
                            const members = staffList.filter(s => s.homeStoreId === st.id);
                            
                            // ヘルプで来る人を抽出
                            let helpInMembers = [];
                            staffList.forEach(s => {
                                if (s.homeStoreId !== st.id) {
                                    let isComing = false;
                                    dateList.forEach(d => {
                                        const val = schedule[`${s.id}_${getDateKey(d)}`];
                                        if (val && val.startsWith(`ヘルプ(${st.name})`)) isComing = true;
                                    });
                                    if (isComing) helpInMembers.push(s);
                                }
                            });

                            if (members.length === 0 && helpInMembers.length === 0) return null;

                            return (
                                <div key={st.id} className="space-y-4">
                                    <h3 className="font-black text-slate-800 text-xl border-l-8 border-slate-900 pl-4 tracking-tighter uppercase">STORE: {st.name}</h3>
                                    <div className="overflow-x-auto rounded-[32px] border border-slate-200 shadow-2xl bg-white overflow-hidden">
                                        <table className="w-full text-[11px] border-collapse min-w-max">
                                            <thead className="bg-slate-900 text-white">
                                                <tr>
                                                    <th className="sticky-name-col font-black bg-slate-900 p-6 z-40 border-r border-slate-800 text-[10px] tracking-[0.2em]">PERSONNEL</th>
                                                    {dateList.map(d => {
                                                        const isEvt = !!st.dailyStoreEvents[getDateKey(d)]; 
                                                        const isH = HOLIDAYS_2025.includes(getDateKey(d)) || [0, 6].includes(getWeekDayIndex(d));
                                                        return <th key={d} className={`p-2 border-r border-slate-800 text-center min-w-[60px] ${isEvt ? 'text-rose-400 bg-rose-900/50' : (isH ? 'text-orange-400 bg-slate-800' : 'text-slate-400')}`}>{d}<br/><span className="text-[9px] font-normal uppercase">{getWeekDay(d)}</span>{isEvt && <div className="text-[8px] font-black text-rose-300">EVENT</div>}</th>;
                                                    })}
                                                    <th className="p-2 text-center bg-black sticky right-0 z-30 font-black border-l border-slate-800">休日<br/><span className="text-[8px] text-slate-400">(公+希+定)</span></th>
                                                    <th className="p-2 text-center bg-pink-900 sticky right-0 z-30 font-black border-l border-slate-800 text-pink-200">有給</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {members.map(staff => {
                                                    let offCount = 0;
                                                    let paidCount = 0;
                                                    dateList.forEach(d => { 
                                                        const v = schedule[`${staff.id}_${getDateKey(d)}`];
                                                        if(['公休','希望休','定休'].includes(v)) offCount++; 
                                                        if(v === '有給') paidCount++;
                                                    });
                                                    const r = ROLES[staff.role.toUpperCase()] || ROLES.CREW;
                                                    return (
                                                        <tr key={staff.id} className="border-b hover:bg-blue-50/50 transition-all group">
                                                            <td className="sticky-name-col font-black p-5 bg-white z-20 shadow-sm border-r">
                                                                <div className="text-slate-900 text-[13px] tracking-tighter mb-1">{staff.name}</div>
                                                                <div className="flex gap-1.5 items-center">
                                                                    <span className={`text-[8px] px-2 py-0.5 rounded-md font-black shadow-sm ${r.color}`}>{r.label}</span>
                                                                    {staff.isTrainer && <Icon name="Shield" size={10} className="text-indigo-600"/>}
                                                                </div>
                                                            </td>
                                                            {dateList.map(d => {
                                                                const val = schedule[`${staff.id}_${getDateKey(d)}`];
                                                                let cellStyle = "p-2 border-r text-center transition-all font-black ";
                                                                let content = val;
                                                                
                                                                if (['公休','希望休','定休'].includes(val)) {
                                                                    cellStyle += "text-slate-200 bg-slate-50/30 font-normal";
                                                                    content = val.substring(0, 1);
                                                                } else if (val === '有給') {
                                                                    cellStyle += "text-pink-600 bg-pink-50";
                                                                    content = "有";
                                                                } else if (val) {
                                                                    const isHome = val.startsWith(st.name);
                                                                    const isHelp = val.startsWith('ヘルプ');
                                                                    const isEvt = staffEventTypes.some(e => e.name === val);

                                                                    if (isHelp) {
                                                                        cellStyle += "text-teal-700 bg-teal-50 text-[9px] leading-tight border-b-2 border-b-teal-500";
                                                                        const dest = val.match(/ヘルプ\((.*?)\)/)?.[1] || '';
                                                                        const type = val.match(/\)\((.*?)\)$/)?.[1] || '';
                                                                        content = <div className="flex flex-col leading-tight"><span className="text-[8px] font-normal opacity-80">→{dest}</span><span className="text-[10px] font-black">{type}</span></div>;
                                                                    } else if (isEvt) {
                                                                        cellStyle += "text-indigo-700 bg-indigo-100 text-[10px]";
                                                                    } else {
                                                                        cellStyle += isHome ? "text-blue-600 bg-blue-50/50" : "text-amber-600 bg-amber-50 text-[9px] leading-tight";
                                                                        content = isHome ? val.match(/\((.*?)\)/)?.[1] || 'フル' : val;
                                                                    }
                                                                }
                                                                return <td key={d} className={cellStyle}>{content}</td>;
                                                            })}
                                                            <td className={`p-3 text-center font-black sticky right-0 bg-white border-l z-20 shadow-xl ${offCount < FIXED_OFF_DAYS ? 'text-rose-500 bg-rose-50 underline decoration-2' : 'text-emerald-500 bg-emerald-50/20'}`}>{offCount}</td>
                                                            <td className="p-3 text-center font-black sticky right-0 bg-pink-50/50 border-l z-20 text-pink-600">{paidCount}</td>
                                                        </tr>
                                                    );
                                                })}
                                                
                                                {/* ヘルプで来るスタッフの表示 */}
                                                {helpInMembers.map(staff => {
                                                    const r = ROLES[staff.role.toUpperCase()] || ROLES.CREW;
                                                    return (
                                                        <tr key={`help-${staff.id}`} className="border-b bg-teal-50/20 hover:bg-teal-50 transition-all group">
                                                            <td className="sticky-name-col font-black p-5 bg-teal-50/20 z-20 border-r">
                                                                <div className="text-teal-900 text-[13px] tracking-tighter mb-1">{staff.name}</div>
                                                                <div className="flex gap-1.5 items-center">
                                                                    <span className={`text-[8px] px-2 py-0.5 rounded-md font-black shadow-sm ${r.color}`}>{r.label}</span>
                                                                    <span className="text-[8px] text-teal-600 font-bold border border-teal-200 px-1 rounded bg-white">応援 ({stores.find(x=>x.id===staff.homeStoreId)?.name})</span>
                                                                </div>
                                                            </td>
                                                            {dateList.map(d => {
                                                                const val = schedule[`${staff.id}_${getDateKey(d)}`];
                                                                let cellStyle = "p-2 border-r text-center transition-all font-black text-slate-300 ";
                                                                let content = "-";
                                                                
                                                                if (val && val.startsWith(`ヘルプ(${st.name})`)) {
                                                                    cellStyle = "text-teal-700 bg-teal-100 border-r border-b-2 border-b-teal-500 text-center";
                                                                    const type = val.match(/\)\((.*?)\)$/)?.[1] || 'フル';
                                                                    content = <div className="flex flex-col leading-tight"><span className="text-[8px] font-normal opacity-80">応援</span><span className="text-[10px] font-black">{type}</span></div>;
                                                                }
                                                                return <td key={d} className={cellStyle}>{content}</td>;
                                                            })}
                                                            <td className="p-3 text-center font-black sticky right-0 bg-white border-l z-20">-</td>
                                                            <td className="p-3 text-center font-black sticky right-0 bg-white border-l z-20">-</td>
                                                        </tr>
                                                    );
                                                })}

                                                {/* 出勤計 */}
                                                <tr className="bg-slate-800 text-white font-bold text-[10px]">
                                                    <td className="sticky-name-col bg-slate-800 p-4 text-right border-r border-slate-700">出勤人数 / 目標</td>
                                                    {dateList.map(d => {
                                                        if (isStoreClosed(st, d)) return <td key={d} className="border-r border-slate-700 bg-rose-900 text-center text-rose-300">休業</td>;
                                                        const key = getDateKey(d);
                                                        const isEvt = !!st.dailyStoreEvents[key];
                                                        const isH = HOLIDAYS_2025.includes(key) || [0, 6].includes(getWeekDayIndex(d));
                                                        let targetNum = isEvt ? st.reqEvent : (isH ? st.reqWeekend : st.reqWeekday);
                                                        if (!isH && !isEvt && targetNum < 2) targetNum = 2; // 表示上も平日最低2
                                                        
                                                        let workers = 0;
                                                        staffList.forEach(s => {
                                                            const v = schedule[`${s.id}_${key}`]; 
                                                            if (v && v.startsWith(st.name)) workers++;
                                                            if (v && v.startsWith(`ヘルプ(${st.name})`)) workers++;
                                                        });

                                                        let colorClass = 'bg-emerald-900/50 text-emerald-300'; // 達成
                                                        if (workers < targetNum) colorClass = 'bg-rose-600 text-white font-black shadow-inner'; // 不足
                                                        else if (workers > targetNum) colorClass = 'bg-blue-900/50 text-blue-300'; // 過剰

                                                        return (
                                                            <td key={d} className={`border-r border-slate-700 text-center ${colorClass}`}>
                                                                <span className="text-sm">{workers}</span><span className="opacity-50 text-[8px] ml-0.5">/ {targetNum}</span>
                                                            </td>
                                                        );
                                                    })}
                                                    <td className="sticky right-0 bg-slate-800 border-l border-slate-700"></td>
                                                    <td className="sticky right-0 bg-slate-800 border-l border-slate-700"></td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )
                        }) : !schedule ? (
                            <div className="py-40 text-center text-slate-200 border-8 border-dashed border-slate-50 rounded-[80px] bg-white flex flex-col items-center gap-10">
                                <Icon name="RefreshCw" size={80} className="opacity-5 animate-spin-slow"/>
                                <p className="text-4xl font-black italic tracking-widest opacity-20">PENDING GENERATION</p>
                            </div>
                        ) : null}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
